<svg xmlns="http://www.w3.org/2000/svg" width="720" height="560" viewBox="0 0 720 560" role="img" aria-labelledby="title desc">
  <title id="title">QuickTab search window</title>
  <desc id="desc">QuickTab searching linux across open tabs, bookmarks, and history.</desc>
  <defs>
